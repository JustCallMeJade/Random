name: Compile Box64 and Run AMD64 Rootfs on ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-24.04-arm  # Native GitHub ARM64 Runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Host Tools & Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y proot wget git cmake build-essential

      - name: Clone and Compile Box64 Normally
        run: |
          git clone --depth 1 https://github.com/ptitSeb/box64.git
          cd box64
          mkdir build && cd build
          # Configure using standard target compilation along with the ARM64 flag
          cmake .. -DARM64=1 -DARM_DYNAREC=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          make -j$(nproc)
          sudo make install

      - name: Download and Extract Ubuntu AMD64 Rootfs
        run: |
          mkdir -p $HOME/ubuntu_amd64
          cd $HOME/ubuntu_amd64
          wget https://cdimage.ubuntu.com/ubuntu-base/releases/24.04/release/ubuntu-base-24.04-base-amd64.tar.gz
          tar -xf ubuntu-base-24.04-base-amd64.tar.gz
          rm ubuntu-base-24.04-base-amd64.tar.gz

      - name: Inject Box64 into Rootfs
        run: |
          # Copy the newly compiled host binary to a path the guest rootfs can locate
          cp $(which box64) $HOME/ubuntu_amd64/usr/bin/box64

      - name: Run AMD64 Script via PRoot + Compiled Box64
        run: |
          proot \
            -r $HOME/ubuntu_amd64 \
            -0 \
            -b /dev \
            -b /proc \
            -b /sys \
            -q /usr/bin/box64 \
            bash -c '
              # Fix internal DNS inside the container
              echo "nameserver 8.8.8.8" > /etc/resolv.conf
              
              echo "=== Architecture Info Inside Container ==="
              dpkg --print-architecture
              uname -m
              
              # Run test apt commands inside the amd64 layer
              apt-get update && apt-get install -y curl
              curl --version
            '
            
