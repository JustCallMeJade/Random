name: Run AMD64 Rootfs on ARM64 using Box64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-amd64-environment:
    runs-on: ubuntu-24.04-arm  # Native GitHub ARM64 Runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Host Prerequisites
        run: |
          sudo apt update
          sudo apt install -y proot wget

      - name: Install Box64 on Host
        run: |
          sudo add-apt-repository ppa:ryanorte/box64 -y
          sudo apt update
          sudo apt install -y box64

      - name: Download and Extract Ubuntu AMD64 Rootfs
        run: |
          mkdir -p $HOME/ubuntu_amd64
          cd $HOME/ubuntu_amd64
          wget https://cdimage.ubuntu.com/ubuntu-base/releases/24.04/release/ubuntu-base-24.04-base-amd64.tar.gz
          tar -xf ubuntu-base-24.04-base-amd64.tar.gz
          rm ubuntu-base-24.04-base-amd64.tar.gz

      - name: Inject Box64 into Rootfs
        run: |
          # Copy the ARM64 host binary into the rootfs so PRoot can reach it internally
          cp $(which box64) $HOME/ubuntu_amd64/usr/bin/box64

      - name: Run AMD64 Script via PRoot
        run: |
          proot \
            -r $HOME/ubuntu_amd64 \
            -0 \
            -b /dev \
            -b /proc \
            -b /sys \
            -q /usr/bin/box64 \
            bash -c '
              # Fix internal DNS inside the rootfs
              echo "nameserver 8.8.8.8" > /etc/resolv.conf
              
              # Run test commands to prove it is running in emulation
              echo "=== Architecture Info Inside Container ==="
              dpkg --print-architecture
              uname -m
              
              # Install an AMD64 app or dependency
              apt-get update && apt-get install -y curl
              curl --version
            '
            
